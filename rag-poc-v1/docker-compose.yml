services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_poc_db
    restart: always
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - rag_poc_data:/var/lib/postgresql/data

volumes:
  rag_poc_data:
